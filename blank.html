<!DOCTYPE html>
<html lang="zh-CN" class="light"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIY 刷题系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .option-btn { transition: all 0.2s ease; }
        .option-btn:hover:not(:disabled) { transform: translateX(5px); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen p-4 md:p-8 transition-colors duration-300">

    <div class="max-w-3xl mx-auto bg-white dark:bg-slate-800 rounded-xl shadow-lg p-6 md:p-10 transition-colors duration-300">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 border-b dark:border-slate-700 pb-4">
            <h1 class="text-2xl font-bold text-indigo-600 dark:text-indigo-400 mb-4 md:mb-0">刷题练习</h1>
            <div class="flex items-center gap-4">
                <select id="bankSelect" class="border dark:border-slate-600 rounded px-3 py-1 bg-slate-50 dark:bg-slate-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors">
                    </select>
                <span id="progressText" class="text-slate-500 dark:text-slate-400 font-medium whitespace-nowrap">0 / 0</span>
                <button id="themeToggleBtn" class="p-2 rounded-lg border dark:border-slate-600 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors focus:outline-none" title="切换深色/浅色模式">
                    🌙
                </button>
            </div>
        </div>

        <div id="questionArea" class="hidden">
            <h2 id="questionText" class="text-lg md:text-xl font-semibold mb-6 leading-relaxed"></h2>
            
            <div id="optionsContainer" class="flex flex-col gap-3 mb-8">
                </div>

            <div id="feedbackArea" class="hidden p-4 rounded-lg mb-6 transition-colors duration-300">
                <p id="feedbackText" class="font-bold mb-2"></p>
                <p id="explanationText" class="text-sm md:text-base leading-relaxed"></p>
            </div>

            <div class="flex justify-end">
                <button id="nextBtn" class="hidden bg-slate-800 dark:bg-slate-200 text-white dark:text-slate-900 px-6 py-2 rounded-lg hover:bg-slate-700 dark:hover:bg-slate-300 transition font-medium shadow">
                    下一题 (Enter)
                </button>
            </div>
        </div>

        <div id="resultArea" class="hidden text-center py-10">
            <h2 class="text-3xl font-bold text-indigo-600 dark:text-indigo-400 mb-4">本轮练习完成！</h2>
            <p id="scoreText" class="text-xl mb-8 dark:text-slate-300"></p>
            <button onclick="startQuiz()" class="bg-indigo-600 dark:bg-indigo-500 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 dark:hover:bg-indigo-600 transition font-bold shadow-lg">
                重新开始 (Enter)
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // 0. 主题模式 (Dark Mode) 手动切换逻辑
        // ==========================================
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const htmlElement = document.documentElement;

        // 初始化检查：如果有本地缓存，则使用缓存；如果没有，看系统是不是深色模式
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
            themeToggleBtn.textContent = '☀️';
        } else {
            htmlElement.classList.remove('dark');
            themeToggleBtn.textContent = '🌙';
        }

        // 按钮点击事件：切换状态并保存到缓存
        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            if (htmlElement.classList.contains('dark')) {
                localStorage.theme = 'dark';
                themeToggleBtn.textContent = '☀️';
            } else {
                localStorage.theme = 'light';
                themeToggleBtn.textContent = '🌙';
            }
        });

        // ==========================================
        // 1. 数据中心 (Standardized Multi-Bank Object Format)
        // ==========================================
        const DATA_CENTER = {
            "默认题库": [
                {
                    "type": "single",
                    "question": "这是一个示例题目，请问 A 选项对应的快捷键是什么？",
                    "options": [
                        "按键盘 A 键 或 1 键",
                        "按键盘 B 键 或 2 键",
                        "按键盘 C 键 或 3 键",
                        "按键盘 D 键 或 4 键"
                    ],
                    "answer": [0],
                    "explain": "在这个升级版系统中，你既可以按 A、B、C、D，也可以按数字 1、2、3、4 来快速选择对应的选项。"
                }
                // 在这里粘贴你的其他题库...
            ]
        };

        // ==========================================
        // 2. 核心状态变量
        // ==========================================
        let currentBankKey = Object.keys(DATA_CENTER)[0];
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let isAnswered = false;

        let historyRecords = JSON.parse(localStorage.getItem('quizHistory')) || {};

        // DOM 元素
        const bankSelect = document.getElementById('bankSelect');
        const questionArea = document.getElementById('questionArea');
        const resultArea = document.getElementById('resultArea');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const feedbackArea = document.getElementById('feedbackArea');
        const feedbackText = document.getElementById('feedbackText');
        const explanationText = document.getElementById('explanationText');
        const nextBtn = document.getElementById('nextBtn');
        const progressText = document.getElementById('progressText');
        const scoreText = document.getElementById('scoreText');

        // ==========================================
        // 3. 初始化逻辑
        // ==========================================
        window.onload = () => {
            for (let key in DATA_CENTER) {
                let option = document.createElement('option');
                option.value = key;
                option.textContent = key;
                bankSelect.appendChild(option);
            }
            
            bankSelect.addEventListener('change', (e) => {
                currentBankKey = e.target.value;
                startQuiz();
            });

            startQuiz();
            initKeyboardShortcuts();
        };

        // ==========================================
        // 4. 键盘快捷键监听 (强化版)
        // ==========================================
        function initKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();

                // Enter 跳转或重新开始
                if (key === 'enter') {
                    if (!resultArea.classList.contains('hidden')) {
                        startQuiz();
                        return;
                    }
                    if (!questionArea.classList.contains('hidden') && !nextBtn.classList.contains('hidden')) {
                        nextBtn.click();
                    }
                }

                // 快捷键: A, B, C, D / 1, 2, 3, 4
                if (['a', 'b', 'c', 'd', '1', '2', '3', '4'].includes(key)) {
                    if (isAnswered || !resultArea.classList.contains('hidden')) return; 
                    
                    const keyToIndex = { 
                        'a': 0, 'b': 1, 'c': 2, 'd': 3,
                        '1': 0, '2': 1, '3': 2, '4': 3 
                    };
                    const targetIndex = keyToIndex[key];
                    
                    const optionButtons = document.querySelectorAll('.option-btn');
                    if (optionButtons[targetIndex]) {
                        optionButtons[targetIndex].click();
                    }
                }
            });
        }

        // ==========================================
        // 5. 核心业务逻辑
        // ==========================================
        function startQuiz() {
            const bank = DATA_CENTER[currentBankKey];
            if (!bank || bank.length === 0) return;

            if (!historyRecords[currentBankKey]) {
                historyRecords[currentBankKey] = [];
            }
            let doneIds = historyRecords[currentBankKey];

            if (bank.length - doneIds.length < 1) {
                doneIds = [];
                historyRecords[currentBankKey] = [];
                localStorage.setItem('quizHistory', JSON.stringify(historyRecords));
            }

            let availableQuestions = bank.filter((_, index) => !doneIds.includes(index));
            currentQuestions = availableQuestions.sort(() => Math.random() - 0.5).slice(0, 10);
            
            currentQuestions.forEach(q => {
                const originalIndex = bank.indexOf(q);
                if (!doneIds.includes(originalIndex)) {
                    doneIds.push(originalIndex);
                }
            });
            localStorage.setItem('quizHistory', JSON.stringify(historyRecords));

            currentIndex = 0;
            score = 0;
            resultArea.classList.add('hidden');
            questionArea.classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            isAnswered = false;
            nextBtn.classList.add('hidden');
            feedbackArea.classList.add('hidden');
            optionsContainer.innerHTML = '';
            
            progressText.textContent = `${currentIndex + 1} / ${currentQuestions.length}`;
            
            const q = currentQuestions[currentIndex];
            questionText.textContent = `${currentIndex + 1}. ${q.question}`;

            let optionsWithIndex = q.options.map((opt, idx) => ({ text: opt, originalIndex: idx }));
            optionsWithIndex = optionsWithIndex.sort(() => Math.random() - 0.5);

            const labels = ['A', 'B', 'C', 'D'];

            optionsWithIndex.forEach((optData, renderIndex) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 rounded-lg border-2 border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 hover:border-indigo-400 dark:hover:border-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/40 focus:outline-none relative';
                
                btn.innerHTML = `<span class="font-bold text-indigo-600 dark:text-indigo-400 mr-2">${labels[renderIndex]}.</span> ${optData.text}`;
                
                btn.onclick = () => checkAnswer(optData.originalIndex, btn, q, optionsWithIndex);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedOriginalIndex, selectedBtn, questionData, optionsWithIndex) {
            if (isAnswered) return;
            isAnswered = true;

            const isCorrect = questionData.answer.includes(selectedOriginalIndex);
            const allBtns = document.querySelectorAll('.option-btn');

            allBtns.forEach(btn => {
                btn.disabled = true;
                btn.classList.remove('hover:border-indigo-400', 'dark:hover:border-indigo-400', 'hover:bg-indigo-50', 'dark:hover:bg-indigo-900/40');
                btn.classList.add('cursor-not-allowed', 'opacity-80');
            });

            feedbackArea.classList.remove('hidden', 'bg-green-50', 'text-green-800', 'dark:bg-green-900/30', 'dark:text-green-300', 'bg-red-50', 'text-red-800', 'dark:bg-red-900/30', 'dark:text-red-300');
            explanationText.innerHTML = `<strong>【解析】</strong> ${questionData.explain}`;

            if (isCorrect) {
                score++;
                selectedBtn.classList.remove('border-slate-200', 'dark:border-slate-600', 'bg-white', 'dark:bg-slate-700');
                selectedBtn.classList.add('border-green-500', 'dark:border-green-400', 'bg-green-100', 'dark:bg-green-900/50');
                
                feedbackArea.classList.add('bg-green-50', 'text-green-800', 'dark:bg-green-900/30', 'dark:text-green-300');
                feedbackText.textContent = "✅ 回答正确！(1.2秒后自动进入下一题)";
                
                setTimeout(nextQuestion, 1200);
            } else {
                selectedBtn.classList.remove('border-slate-200', 'dark:border-slate-600', 'bg-white', 'dark:bg-slate-700');
                selectedBtn.classList.add('border-red-500', 'dark:border-red-400', 'bg-red-100', 'dark:bg-red-900/50');
                
                const correctRenderIndex = optionsWithIndex.findIndex(o => questionData.answer.includes(o.originalIndex));
                if (correctRenderIndex !== -1) {
                    allBtns[correctRenderIndex].classList.remove('border-slate-200', 'dark:border-slate-600', 'bg-white', 'dark:bg-slate-700');
                    allBtns[correctRenderIndex].classList.add('border-green-500', 'dark:border-green-400', 'bg-green-100', 'dark:bg-green-900/50');
                }

                feedbackArea.classList.add('bg-red-50', 'text-red-800', 'dark:bg-red-900/30', 'dark:text-red-300');
                feedbackText.textContent = "❌ 回答错误！";
                
                nextBtn.classList.remove('hidden');
            }
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            questionArea.classList.add('hidden');
            resultArea.classList.remove('hidden');
            const acc = Math.round((score / currentQuestions.length) * 100);
            scoreText.innerHTML = `你完成了 ${currentQuestions.length} 道题<br>答对 ${score} 道<br>正确率：<span class="font-bold text-indigo-600 dark:text-indigo-400">${acc}%</span>`;
        }
        
        nextBtn.addEventListener('click', nextQuestion);
    </script>
</body>
</html>
